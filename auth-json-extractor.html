<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auth JSON 提取工具</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --ink: #18202f;
        --muted: #647084;
        --line: #d9dee8;
        --brand: #0f766e;
        --brand-strong: #0b5f59;
        --danger: #b42318;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #10141d;
          --panel: #171d2a;
          --ink: #eef3fb;
          --muted: #9ba7ba;
          --line: #2c3547;
          --brand: #2dd4bf;
          --brand-strong: #5eead4;
          --danger: #f97066;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        width: min(1280px, 100%);
        margin: 0 auto;
        padding: 24px;
        display: grid;
        gap: 16px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        line-height: 1.2;
      }

      p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.55;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 13px;
        background: var(--panel);
        color: var(--ink);
        font: 650 0.86rem/1 var(--font-ui, inherit);
        cursor: pointer;
      }

      button.primary {
        border-color: var(--brand);
        background: var(--brand);
        color: #ffffff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .panel {
        min-width: 0;
        display: grid;
        gap: 10px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .panelHeader {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }

      .panelHeader strong {
        font-size: 0.92rem;
      }

      .panelHeader span,
      .status {
        color: var(--muted);
        font-size: 0.78rem;
      }

      textarea {
        width: 100%;
        min-height: 560px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: color-mix(in srgb, var(--panel) 88%, var(--bg) 12%);
        color: var(--ink);
        font: 500 0.82rem/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas,
          "Liberation Mono", monospace;
        outline: none;
      }

      textarea:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 18%, transparent);
      }

      .status.hasError {
        color: var(--danger);
      }

      @media (max-width: 880px) {
        main {
          padding: 16px;
        }

        header {
          align-items: stretch;
          flex-direction: column;
        }

        .actions {
          justify-content: flex-start;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        textarea {
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Auth JSON 提取工具</h1>
          <p>
            粘贴一整段 JSON，工具会递归提取 access_token、id_token、refresh_token
            和 account_id，生成可导入的 JSON 数组。
          </p>
        </div>
        <div class="actions">
          <button id="formatInputButton" type="button">格式化输入</button>
          <button id="extractButton" class="primary" type="button">提取</button>
          <button id="copyButton" type="button" disabled>复制结果</button>
          <button id="downloadButton" type="button" disabled>下载 import.json</button>
        </div>
      </header>

      <section class="grid">
        <article class="panel">
          <div class="panelHeader">
            <strong>输入 JSON</strong>
            <span id="inputStats">等待输入</span>
          </div>
          <textarea id="input" spellcheck="false" placeholder="在这里粘贴原始 JSON"></textarea>
        </article>

        <article class="panel">
          <div class="panelHeader">
            <strong>导入 JSON</strong>
            <span id="outputStats">暂无结果</span>
          </div>
          <textarea id="output" spellcheck="false" readonly></textarea>
          <div id="status" class="status">输出可直接保存为 import.json 后导入工具。</div>
        </article>
      </section>
    </main>

    <script>
      const inputEl = document.getElementById("input");
      const outputEl = document.getElementById("output");
      const inputStatsEl = document.getElementById("inputStats");
      const outputStatsEl = document.getElementById("outputStats");
      const statusEl = document.getElementById("status");
      const formatInputButton = document.getElementById("formatInputButton");
      const extractButton = document.getElementById("extractButton");
      const copyButton = document.getElementById("copyButton");
      const downloadButton = document.getElementById("downloadButton");

      function setStatus(message, hasError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("hasError", hasError);
      }

      function normalizeAuth(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          return null;
        }

        const sourceTokens =
          value.tokens && typeof value.tokens === "object" && !Array.isArray(value.tokens)
            ? value.tokens
            : value;
        const accessToken = stringValue(sourceTokens.access_token);
        const idToken = stringValue(sourceTokens.id_token);
        if (!accessToken || !idToken) {
          return null;
        }

        const tokens = {
          access_token: accessToken,
          id_token: idToken,
        };
        const refreshToken = stringValue(sourceTokens.refresh_token);
        const accountId = stringValue(sourceTokens.account_id);
        if (refreshToken) {
          tokens.refresh_token = refreshToken;
        }
        if (accountId) {
          tokens.account_id = accountId;
        }

        const normalized = {
          auth_mode: stringValue(value.auth_mode) || "chatgpt",
          tokens,
        };
        if (value.last_refresh !== undefined && value.last_refresh !== null) {
          normalized.last_refresh = value.last_refresh;
        }
        return normalized;
      }

      function stringValue(value) {
        return typeof value === "string" && value.trim() ? value.trim() : null;
      }

      function walk(value, out) {
        if (Array.isArray(value)) {
          for (const item of value) {
            walk(item, out);
          }
          return;
        }
        if (!value || typeof value !== "object") {
          return;
        }

        for (const key of ["authJson", "auth_json"]) {
          const auth = normalizeAuth(value[key]);
          if (auth) {
            out.push(auth);
          }
        }

        const selfAuth = normalizeAuth(value);
        if (selfAuth) {
          out.push(selfAuth);
        }

        for (const child of Object.values(value)) {
          walk(child, out);
        }
      }

      function dedupe(auths) {
        const seen = new Set();
        const result = [];
        for (const auth of auths) {
          const tokens = auth.tokens || {};
          const key = [
            tokens.account_id || "",
            tokens.access_token || "",
            tokens.id_token || "",
            tokens.refresh_token || "",
          ].join("\u0000");
          if (seen.has(key)) {
            continue;
          }
          seen.add(key);
          result.push(auth);
        }
        return result;
      }

      function parseInput() {
        const raw = inputEl.value.trim();
        if (!raw) {
          throw new Error("请先粘贴 JSON。");
        }
        return JSON.parse(raw);
      }

      function extract() {
        try {
          const parsed = parseInput();
          const auths = [];
          walk(parsed, auths);
          const result = dedupe(auths);
          outputEl.value = JSON.stringify(result, null, 2);
          outputStatsEl.textContent = `提取到 ${result.length} 个账号`;
          copyButton.disabled = result.length === 0;
          downloadButton.disabled = result.length === 0;
          setStatus(
            result.length
              ? "提取完成。结果可直接导入工具。"
              : "没有找到 access_token + id_token 组合。",
            result.length === 0,
          );
        } catch (error) {
          outputEl.value = "";
          outputStatsEl.textContent = "提取失败";
          copyButton.disabled = true;
          downloadButton.disabled = true;
          setStatus(`JSON 解析或提取失败：${error.message}`, true);
        }
      }

      function updateInputStats() {
        const length = inputEl.value.length;
        inputStatsEl.textContent = length ? `${length.toLocaleString()} 字符` : "等待输入";
      }

      inputEl.addEventListener("input", updateInputStats);
      extractButton.addEventListener("click", extract);

      formatInputButton.addEventListener("click", () => {
        try {
          inputEl.value = JSON.stringify(parseInput(), null, 2);
          updateInputStats();
          setStatus("输入已格式化。");
        } catch (error) {
          setStatus(`格式化失败：${error.message}`, true);
        }
      });

      copyButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(outputEl.value);
          setStatus("结果已复制。");
        } catch {
          outputEl.select();
          document.execCommand("copy");
          setStatus("结果已复制。");
        }
      });

      downloadButton.addEventListener("click", () => {
        const blob = new Blob([outputEl.value], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = "import.json";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
      });
    </script>
  </body>
</html>
